{% extends "admin/base_admin.html" %}
{% block title %}Admin — Users{% endblock %}

{% block admin_content %}
<h1 class="text-2xl font-bold mb-4">Users</h1>
<div class="overflow-x-auto">
  <table class="table table-zebra bg-base-100">
    <thead><tr><th>Email</th><th>Role</th><th>Joined</th></tr></thead>
    <tbody>
      {% for u in users %}
      <tr>
        <td>{{ u.email }}</td>
        <td><span class="badge badge-{{ 'primary' if u.role == 'admin' else 'ghost' }}">{{ u.role }}</span></td>
        <td>{{ u.created_at.strftime('%Y-%m-%d') if u.created_at else '-' }}</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
