<!DOCTYPE html>
<html lang="en" data-theme="{{ tenant.theme['name'] if tenant and tenant.theme and 'name' in tenant.theme else 'dark' }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{{ tenant.name if tenant else 'Private AI' }}{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.23/dist/full.min.css" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    /* Markdown prose styling inside chat bubbles */
    .chat-bubble .md-content h1, .chat-bubble .md-content h2, .chat-bubble .md-content h3 { font-weight: 700; margin: 0.5em 0 0.25em; }
    .chat-bubble .md-content h1 { font-size: 1.25em; }
    .chat-bubble .md-content h2 { font-size: 1.1em; }
    .chat-bubble .md-content p { margin: 0.4em 0; }
    .chat-bubble .md-content ul, .chat-bubble .md-content ol { margin: 0.4em 0; padding-left: 1.5em; }
    .chat-bubble .md-content li { margin: 0.15em 0; }
    .chat-bubble .md-content code { background: rgba(0,0,0,0.2); padding: 0.1em 0.3em; border-radius: 0.25em; font-size: 0.9em; }
    .chat-bubble .md-content pre { background: rgba(0,0,0,0.3); padding: 0.75em; border-radius: 0.5em; overflow-x: auto; margin: 0.5em 0; }
    .chat-bubble .md-content pre code { background: none; padding: 0; }
    .chat-bubble .md-content blockquote { border-left: 3px solid currentColor; padding-left: 0.75em; opacity: 0.8; margin: 0.5em 0; }
    .chat-bubble .md-content table { border-collapse: collapse; margin: 0.5em 0; }
    .chat-bubble .md-content th, .chat-bubble .md-content td { border: 1px solid currentColor; padding: 0.25em 0.5em; opacity: 0.9; }
    .chat-bubble .md-content a { text-decoration: underline; }
    .chat-bubble .md-content strong { font-weight: 700; }
  </style>
  {% if tenant and tenant.theme and tenant.theme is mapping and tenant.theme.definition is defined %}
  <style>
    [data-theme="{{ tenant.theme.name }}"] {
      {% for key, value in tenant.theme.definition.items() %}
      --{{ key }}: {{ value }};
      {% endfor %}
    }
  </style>
  {% endif %}
</head>
<body class="min-h-screen bg-base-200">
  {% include "macros/nav.html" %}
  <main class="container mx-auto p-4">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
