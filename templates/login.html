<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Private AI</title>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.23/dist/full.min.css" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-base-200 flex items-center justify-center">
  <div class="card w-96 bg-base-100 shadow-xl">
    <div class="card-body">
      <h2 class="card-title justify-center text-2xl mb-4">Private AI</h2>

      {% if error %}
      <div class="alert alert-error mb-4">
        <span>{{ error }}</span>
      </div>
      {% endif %}

      <form method="POST" action="/login">
        <div class="form-control w-full mb-4">
          <label class="label"><span class="label-text">Email</span></label>
          <input type="email" name="email" placeholder="dev@localhost"
                 class="input input-bordered w-full" required autofocus
                 data-testid="login-email">
        </div>
        <button type="submit" class="btn btn-primary w-full" data-testid="login-submit">
          Sign In
        </button>
      </form>

      <p class="text-center text-xs opacity-50 mt-4">
        Dev mode — any email works
      </p>
    </div>
  </div>
</body>
</html>
