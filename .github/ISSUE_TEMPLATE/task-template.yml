---
name: AgenticBricks Task
description: Create a task, feature, bug or chore for the Sprint Board
title: "[TYPE] Brief description"
projects: ["AgenticBricksRepo/1"]
labels: []
body:
  - type: dropdown
    id: project
    attributes:
      label: Project
      description: Which project does this belong to?
      options:
        - StMarys
    validations:
      required: true

  - type: dropdown
    id: type
    attributes:
      label: Issue Type
      options:
        - Feature
        - Bug
        - Chore
        - Docs
        - Spike
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - High
        - Medium
        - Low
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What needs to be done and why?
      placeholder: Describe the task clearly...
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      placeholder: |
        - [ ] Criteria 1
        - [ ] Criteria 2
    validations:
      required: false

  - type: textarea
    id: notes
    attributes:
      label: Additional Notes
      description: Links to designs, related issues, dependencies
    validations:
      required: false
